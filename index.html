<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 おうちの献立ノート - わが家のごはんルーティン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #FAF8F5; color: #3D3A45; }
        .font-handwriting { font-family: 'Kiwi Maru', sans-serif; }
        .soft-card { box-shadow: 0 10px 25px -5px rgba(224, 122, 95, 0.04), 0 8px 10px -6px rgba(224, 122, 95, 0.04); border: 1px solid #F1ECE6; }
        .checked-item { text-decoration: line-through; color: #A9A5A0; opacity: 0.5; transition: all 0.3s ease; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-open { max-height: 1200px; transition: max-height 0.5s ease-in; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-16">

    <header class="bg-white border-b border-[#F1ECE6] sticky top-0 z-30 shadow-sm shadow-[#FAF8F5]/80">

            <div class="flex items-center space-x-2.5">

                    <i class="fa-solid fa-cookie-bite text-xl"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold text-[#3D3A45] tracking-wide font-handwriting">おうちの献立ノート</h1>

            </div>
            <div class="flex items-center space-x-1">

                <button id="btn-toggle-config" class="text-[#A9A5A0] hover:text-[#E07A5F] w-8 h-8 rounded-full hover:bg-[#FAF8F5] flex items-center justify-center transition"><i class="fa-solid fa-sliders"></i></button>
            </div>
        </div>
    </header>

            </div>

                <div class="bg-[#FAF8F5] p-3 rounded-2xl border border-[#F1ECE6]/60 flex flex-col justify-between">
                    <span class="text-xs font-bold text-[#E07A5F] mb-1.5 block">月曜日</span>
                    <select id="pattern-mon" class="w-full text-xs bg-white rounded-xl border border-[#F1ECE6] p-2 outline-none font-medium text-[#6D6A75]"><option value="揚げ物（トンカツ、から揚げなど）">🍗 揚げ物</option><option value="お肉メイン（炒めもの、煮物など）" selected>🥩 お肉系</option><option value="お魚メイン（焼き魚、煮魚など）">🐟 お魚系</option><option value="麺類（うどん、パスタなど）">🍜 麺類</option><option value="カレー・シチュー系">🍛 カレー系</option><option value="丼もの（親子丼、牛丼など）">🍚 丼もの</option><option value="おまかせ">✨ おまかせ</option></select>

                    <select id="pattern-tue" class="w-full text-xs bg-white rounded-xl border border-[#F1ECE6] p-2 outline-none font-medium text-[#6D6A75]"><option value="揚げ物（トンカツ、から揚げなど）">🍗 揚げ物</option><option value="お肉メイン（炒めもの、煮物など）">🥩 お肉系</option><option value="お魚メイン（焼き魚、煮魚など）">🐟 お魚系</option><option value="麺類（うどん、パスタなど）" selected>🍜 麺類</option><option value="カレー・シチュー系">🍛 カレー系</option><option value="丼もの（親子丼、牛丼など）">🍚 丼もの</option><option value="おまかせ">✨ おまかせ</option></select>
                </div>
                <div class="bg-[#FAF8F5] p-3 rounded-2xl border border-[#F1ECE6]/60 flex flex-col justify-between">
                    <span class="text-xs font-bold text-[#E07A5F] mb-1.5 block">水曜日</span>
                    <select id="pattern-wed" class="w-full text-xs bg-white rounded-xl border border-[#F1ECE6] p-2 outline-none font-medium text-[#6D6A75]"><option value="揚げ物（トンカツ、から揚げなど）">🍗 揚げ物</option><option value="お肉メイン（炒めもの、煮物など）">🥩 お肉系</option><option value="お魚メイン（焼き魚、煮魚など）" selected>🐟 お魚系</option><option value="麺類（うどん、パスタなど）">🍜 麺類</option><option value="カレー・シチュー系">🍛 カレー系</option><option value="丼もの（親子丼、牛丼など）">🍚 丼もの</option><option value="おまかせ">✨ おまかせ</option></select>
                </div>
                <div class="bg-[#FAF8F5] p-3 rounded-2xl border border-[#F1ECE6]/60 flex flex-col justify-between">
                    <span class="text-xs font-bold text-[#E07A5F] mb-1.5 block">木曜日</span>
                    <select id="pattern-thu" class="w-full text-xs bg-white rounded-xl border border-[#F1ECE6] p-2 outline-none font-medium text-[#6D6A75]"><option value="揚げ物（トンカツ、から揚げなど）">🍗 揚げ物</option><option value="お肉メイン（炒めもの、煮物など）">🥩 お肉系</option><option value="お魚メイン（焼き魚、煮魚など）">🐟 お魚系</option><option value="麺類（うどん、パスタなど）">🍜 麺類</option><option value="カレー・シチュー系">🍛 カレー系</option><option value="丼もの（親子丼、牛丼など）" selected>🍚 丼もの</option><option value="おまかせ">✨ おまかせ</option></select>
                </div>
                <div class="bg-[#FAF8F5] p-3 rounded-2xl border border-[#F1ECE6]/60 flex flex-col justify-between">
                    <span class="text-xs font-bold text-[#E07A5F] mb-1.5 block">金曜日</span>
                    <select id="pattern-fri" class="w-full text-xs bg-white rounded-xl border border-[#F1ECE6] p-2 outline-none font-medium text-[#6D6A75]"><option value="揚げ物（トンカツ、から揚げなど）">🍗 揚げ物</option><option value="お肉メイン（炒めもの、煮物など）">🥩 お肉系</option><option value="お魚メイン（焼き魚、煮魚など）">🐟 お魚系</option><option value="麺類（うどん、パスタなど）">🍜 麺類</option><option value="カレー・シチュー系" selected>🍛 カレー系</option><option value="丼もの（親子丼、牛丼など）">🍚 丼もの</option><option value="おまかせ">✨ おまかせ</option></select>
                </div>
            </div>
        </section>

        <section id="input-dashboard" class="bg-white rounded-3xl p-6 border border-[#F1ECE6] soft-card space-y-4">
            <div class="flex items-center space-x-2"><span class="text-lg">👩‍🍳</span><h2 class="font-bold text-sm text-[#3D3A45]">今週のわがままリクエスト</h2></div>
            <div class="space-y-2">
                <label class="block text-xs font-bold text-[#A9A5A0]"><i class="fa-solid fa-basket-shopping mr-1 text-[#81B29A]"></i> 優先して使いたい食材（複数選択可）</label>
                <div class="flex flex-wrap gap-1.5" id="weekly-ingredients">
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="豚肉">🐷 豚肉</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="鶏肉">🐔 鶏肉</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="合い挽き肉">🥩 ひき肉</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="魚類">🐟 お魚類</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="キャベツ">🥬 キャベツ</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="玉ねぎ">🧅 玉ねぎ</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="じゃがいも">🥔 じゃがいも</button>
                    <button class="tag-btn px-3.5 py-1.5 text-xs rounded-full bg-[#FAF8F5] border border-[#F1ECE6] text-[#6D6A75]" data-val="豆腐">⬜ 豆腐</button>
                </div>
            </div>
            <div class="space-y-1.5">
                <label for="weekly-free" class="block text-xs font-bold text-[#A9A5A0]"><i class="fa-regular fa-comment-dots mr-1 text-[#E07A5F]"></i> アレルギー、苦手なもの、AI栄養士への伝言</label>
                <textarea id="weekly-free" rows="2" class="w-full text-xs rounded-2xl border-[#F1ECE6] border p-3.5 focus:ring-1 focus:ring-[#E07A5F] outline-none bg-[#FAF8F5]/30" placeholder="例：こどもが辛いもの苦手です。"></textarea>
            </div>
        </section>

        <div id="loader" class="hidden bg-white rounded-3xl p-6 border border-[#F1ECE6] soft-card text-center space-y-3 fade-in">
            <div class="relative w-12 h-12 mx-auto"><div class="absolute inset-0 border-4 border-[#FAF8F5] rounded-full"></div><div class="absolute inset-0 border-4 border-t-[#E07A5F] rounded-full animate-spin"></div></div>
            <p id="loader-status" class="text-xs font-bold text-[#3D3A45] font-handwriting">AI栄養士がノートに書き込み中...</p>
            <div class="w-full bg-[#FAF8F5] h-1.5 rounded-full overflow-hidden max-w-xs mx-auto border"><div id="loader-bar" class="bg-[#81B29A] h-full transition-all duration-300" style="width: 0%"></div></div>
        </div>

        <div id="results-area" class="space-y-5">
            <div class="flex bg-white p-1.5 rounded-2xl border border-[#F1ECE6] shadow-sm">
                <button id="tab-btn-menus" class="tab-btn flex-1 text-xs font-bold py-3 rounded-xl transition bg-[#E07A5F] text-white" data-target="tab-content-menus"><i class="fa-solid fa-utensils mr-1.5"></i>献立ノート</button>
                <button id="tab-btn-shopping" class="tab-btn flex-1 text-xs font-bold py-3 rounded-xl transition text-[#A9A5A0]" data-target="tab-content-shopping"><i class="fa-solid fa-cart-shopping mr-1.5"></i>まとめ買い物</button>
            </div>
            <div id="tab-content-menus" class="tab-panel space-y-4"></div>
            <div id="tab-content-shopping" class="tab-panel hidden space-y-4">
                <div class="bg-white rounded-3xl p-6 border border-[#F1ECE6] soft-card space-y-4">
                    <div class="flex items-center justify-between border-b border-[#FAF8F5] pb-2">
                        <div class="flex items-center space-x-2"><span class="text-lg">🛒</span><h4 class="font-bold text-sm text-[#3D3A45]">スーパーの「売り場別」まとめお買い物ノート</h4></div>
                    </div>
                    <div id="shopping-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzZHiGnmmJU0D1lrAN9Iv5D_zKYb34w2dX_c7p-udQxPbaVt_GNlo5VYIE6BLt5D890Ag/exec";
        const DAYS_LIST = ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日"];
        let weeklyMenu = [];
        let selectedWeeklyIngredients = [];
        let loaderInterval = null;

        // 💡【Consoleクラッシュ絶対防御】：何が起きてもまず確実に画面の枠組みをマウントする
        document.addEventListener("DOMContentLoaded", async () => {
            restoreWeeklyPatterns();
            if (localStorage.getItem("gemini_user_api_key")) inputApiKey.value = localStorage.getItem("gemini_user_api_key");

            // タグのイベント登録
            document.querySelectorAll(".tag-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const val = btn.getAttribute("data-val");
                    if (selectedWeeklyIngredients.includes(val)) {
                        selectedWeeklyIngredients = selectedWeeklyIngredients.filter(v => v !== val);
                        btn.classList.remove("bg-[#81B29A]/20", "text-[#4A735E]", "border-[#81B29A]");
                    } else {
                        selectedWeeklyIngredients.push(val);
                        btn.classList.add("bg-[#81B29A]/20", "text-[#4A735E]", "border-[#81B29A]");
                    }
                });
            });

            // タブのイベント登録
            document.querySelectorAll(".tab-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    document.querySelectorAll(".tab-btn").forEach(b => { b.classList.remove("bg-[#E07A5F]", "text-white"); b.classList.add("text-[#A9A5A0]"); });
                    btn.classList.add("bg-[#E07A5F]", "text-white"); btn.classList.remove("text-[#A9A5A0]");
                    document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
                    document.getElementById(btn.getAttribute("data-target")).classList.remove("hidden");
                });
            });

            // 🌟 1. 【安全第一】：通信の前に、ローカルバックアップから最速で枠を画面にマウント
            const savedData = localStorage.getItem("gemini_saved_menu_data");
            if (savedData) { try { weeklyMenu = JSON.parse(savedData).menus || []; } catch(e) {} }
            
            initializeWeeklyMenuArray();
            renderAll(); // 🌟ここで開いた瞬間に100%確実に白紙（または過去データ）の枠が物理出現します！

            // 🌟 2. 【安全同期】：サーバーからの返答が空（null）やHTMLの塊であっても、絶対にフリーズさせない鉄壁のガード
            try {
                const response = await fetch(GAS_URL);
                if (response.ok) {
                    const textData = await response.text();
                    
                    // 💡【ログ原因の完全パースデバッグ】：GoogleのエラーHTMLや空文字、金庫空っぽ（EMPTY_DB）を完璧に弾き飛ばす
                    if (textData && textData !== "EMPTY_DB" && !textData.trim().startsWith("<!DOCTYPE")) {
                        const parsedServer = JSON.parse(textData);
                        
                        // 💡【Consoleログの真犯人を撃破】：サーバーデータの階層構造を極めて安全にオプショナルチェック
                        if (parsedServer && parsedServer.data && Array.isArray(parsedServer.data.menus)) {
                            weeklyMenu = parsedServer.data.menus;
                            initializeWeeklyMenuArray();
                            renderAll();
                            console.log("家族クラウド金庫との自動同期に成功しました。");
                        } else if (parsedServer && Array.isArray(parsedServer.menus)) {
                            // 古いデータ構造の救済ルート
                            weeklyMenu = parsedServer.menus;
                            initializeWeeklyMenuArray();
                            renderAll();
                        }
                    }
                }
            } catch (err) {
                console.log("クラウド金庫は現在初期状態（空っぽ）です。手元のローカルノートで安全に稼働します。");
            }
        });

        function initializeWeeklyMenuArray() {
            const tempMap = {};
            if (Array.isArray(weeklyMenu)) {
                weeklyMenu.forEach(m => { if(m && m.day) tempMap[m.day] = m; });
            }
            weeklyMenu = DAYS_LIST.map(dayName => tempMap[dayName] || { day: dayName, is_empty: true });
        }

        function restoreWeeklyPatterns() {
            const saved = localStorage.getItem("gemini_weekly_patterns");
            if (saved) {
                try {
                    const p = JSON.parse(saved);
                    if (p.mon) patternMon.value = p.mon; if (p.tue) patternTue.value = p.tue; if (p.wed) patternWed.value = p.wed; if (p.thu) patternThu.value = p.thu; if (p.fri) patternFri.value = p.fri;
                } catch (e) {}
            }
        }

        btnResetAll.addEventListener("click", async () => {
            if (confirm("すべての献立ノートと買い物リストの履歴を消去しますか？")) {
                localStorage.removeItem("gemini_saved_menu_data");
                localStorage.removeItem("gemini_checked_items");
                try {
                    await fetch(GAS_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ action: "save_db_menu", menuData: null })
                    });
                } catch(e) {}
                window.location.reload();
            }
        });

        btnToggleConfig.addEventListener("click", () => configPanel.classList.toggle("hidden"));
        btnSaveKey.addEventListener("click", () => {
            localStorage.setItem("gemini_user_api_key", inputApiKey.value.trim());
            alert("APIキーを保存しました。");
        });
        btnClearKey.addEventListener("click", () => {
            localStorage.removeItem("gemini_user_api_key");
            inputApiKey.value = "";
            alert("個別キーを消去しました。");
        });

        function startLoaderAnimation() {
            let p = 0; loaderBar.style.width = "0%";
            loaderInterval = setInterval(() => { p += Math.random() * 12; if (p > 95) p = 95; loaderBar.style.width = `${p}%`; }, 300);
        }
        function stopLoaderAnimation() {
            if (loaderInterval) { clearInterval(loaderInterval); loaderInterval = null; }
            loaderBar.style.width = "100%";
        }

        // --- 3. 指数バックオフ付きAPI通信中継関数 ---
        async function fetchGeminiAPI(prompt, systemInstruction, schema, retries = 4, initialDelay = 2000) {
            const userKey = localStorage.getItem("gemini_user_api_key") || "";
            const payload = { prompt: prompt, systemInstruction: systemInstruction, schema: schema, userKey: userKey };
            let currentDelay = initialDelay;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.ok) {
                        const rawText = await response.text();
                        
                        if (rawText.startsWith("Google_API_Error_") || rawText.startsWith("GAS_Internal_Error")) {
                            const parsedErr = parseFriendlyErrorMessage(rawText);
                            if (parsedErr.is_503 && i < retries - 1) {
                                const statusText = document.getElementById("loader-status");
                                if (statusText) statusText.innerText = `【混雑回避】サーバーが大変混み合っています。自動再試行中... (${i+1}/${retries}回目)`;
                                await new Promise(r => setTimeout(r, currentDelay));
                                currentDelay *= 2;
                                continue;
                            }
                            throw new Error(parsedErr.msg);
                        }
                        
                        return JSON.parse(rawText);
                    }
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
                await new Promise(r => setTimeout(r, currentDelay));
                currentDelay *= 2;
            }
            throw new Error("AIサーバーの混雑が続いています。15秒ほど時間を置いてから、もう一度ボタンを押してください。");
        }

        function parseFriendlyErrorMessage(rawErrorText) {
            let is_503 = false;
            let msg = "【通信エラー】一時的にAIとの通信に失敗しました。もう一度お試しください。";
            
            if (rawErrorText.includes("503") || rawErrorText.includes("UNAVAILABLE")) {
                is_503 = true;
                msg = "【AIサーバー混雑】現在GoogleのAIサーバーが大変混み合っています。一時的なものですので、少し時間を置いてから再度お試しください。";
            } else if (rawErrorText.includes("429") || rawErrorText.includes("RESOURCE_EXHAUSTED")) {
                msg = "【リクエスト過剰】短時間に通信が集中しました。1分ほど待ってからもう一度お試しください。";
            }
            return { is_503, msg };
        }

        const singleDayProductionSchema = {
            type: "OBJECT",
            properties: {
                day_menu: {
                    type: "OBJECT",
                    properties: {
                        day: { type: "STRING" }, main_dish: { type: "STRING" }, main_key_point: { type: "STRING" }, sub_dish: { type: "STRING" }, soup: { type: "STRING" }, time_mins: { type: "INTEGER" },
                        recipe: { type: "OBJECT", properties: { ingredients: { type: "ARRAY", items: { type: "STRING" } }, steps: { type: "ARRAY", items: { type: "STRING" } } }, required: ["ingredients", "steps"] },
                        day_shopping: { type: "ARRAY", items: { type: "OBJECT", properties: { section: { type: "STRING" }, items: { type: "ARRAY", items: { type: "STRING" } } }, required: ["section", "items"] } }
                    },
                    required: ["day", "main_dish", "main_key_point", "sub_dish", "soup", "time_mins", "recipe", "day_shopping"]
                }
            },
            required: ["day_menu"]
        };

        window.buildSingleDayMenu = async function(dayName, idx, customReason = "") {
            const selectEl = document.getElementById(`pattern-${dayName === '月曜日' ? 'mon' : dayName === '火曜日' ? 'tue' : dayName === '水曜日' ? 'wed' : dayName === '木曜日' ? 'thu' : 'fri'}`);
            const currentRule = selectEl ? selectEl.value : "おまかせ";

            let reqIng = selectedWeeklyIngredients.length > 0 ? `優先食材: ${selectedWeeklyIngredients.join('、')}` : "";
            let reqFree = weeklyFree.value.trim() ? `伝言: ${weeklyFree.value.trim()}` : "";
            if (customReason) reqFree += ` (※この日の変更リクエスト: ${customReason})`;

            startLoaderAnimation();
            const statusText = document.getElementById("loader-status");
            if (statusText) statusText.innerText = `AI栄養士が【${dayName}】の専用ノートを書き込んでいます...`;
            loader.classList.remove("hidden");
            document.querySelectorAll(".gen-btn").forEach(b => b.disabled = true);

            const systemInstruction = "あなたは5人家族の夕食を支える温かい管理栄養士です。指定された曜日のルールを厳守し、完璧なJSON構造でのみ出力してください。";
            const prompt = `対象曜日: ${dayName}\nルール: ${currentRule}\n${reqIng}\n${reqFree}\n材料、手順、買い物アイテムをJSONケースで出力してください。`;

            try {
                const apiResponse = await fetchGeminiAPI(prompt, systemInstruction, singleDayProductionSchema);
                const responseText = apiResponse.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!responseText) throw new Error("AIからの応答が空でした。");

                const cleanedText = cleanJsonString(responseText);
                weeklyMenu[idx] = JSON.parse(cleanedText).day_menu;

                const dataToSave = { menus: weeklyMenu };
                localStorage.setItem("gemini_saved_menu_data", JSON.stringify(dataToSave));
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "save_db_menu", menuData: dataToSave }) });

                if (loaderInterval) { clearInterval(loaderInterval); loaderInterval = null; }
                loaderBar.style.width = "100%";
                renderAll();
                loader.classList.add("hidden");
            } catch (err) {
                if (loaderInterval) { clearInterval(loaderInterval); loaderInterval = null; }
                loader.classList.add("hidden");
                alert(err.message || err);
            } finally {
                document.querySelectorAll(".gen-btn").forEach(b => b.disabled = false);
            }
        };

        window.reBuildSingleDay = async function(dayName, idx) {
            const inputEl = document.getElementById(`change-input-${idx}`);
            const reason = inputEl ? inputEl.value.trim() : "";
            if(!reason) { alert("変更したい理由を入力してください。"); return; }
            await window.buildSingleDayMenu(dayName, idx, reason);
            inputEl.value = "";
        };

        function renderAll() { renderWeeklyMenus(); renderMergedShoppingList(); }

        function renderWeeklyMenus() {
            tabContentMenus.innerHTML = "";
            weeklyMenu.forEach((m, idx) => {
                const card = document.createElement("div");
                if (!m || m.is_empty) {
                    card.className = "bg-white/40 rounded-3xl border-2 border-dashed border-[#F1ECE6] p-6 text-center space-y-3 fade-in";
                    card.innerHTML = `
                        <div class="flex items-center justify-between border-b pb-2"><span class="text-xs font-bold text-[#A9A5A0] bg-slate-100 px-4 py-1.5 rounded-full font-handwriting">${DAYS_LIST[idx]}</span></div>
                        <div class="py-2">
                            <p class="text-xs text-[#A9A5A0] mb-3">この曜日の献立ノートは白紙です。</p>
                            <button class="gen-btn bg-white hover:bg-[#E07A5F] border border-[#E07A5F] text-[#E07A5F] hover:text-white text-xs font-bold px-5 py-2.5 rounded-xl transition flex items-center space-x-1.5 mx-auto" onclick="window.buildSingleDayMenu('${DAYS_LIST[idx]}', ${idx})"><i class="fa-solid fa-feather-pointed"></i><span>${DAYS_LIST[idx]}のノートを書く</span></button>
                        </div>`;
                    tabContentMenus.appendChild(card); return;
                }

                const recipeId = `recipe-${idx}`; const changeFormId = `change-form-${idx}`;
                card.className = "bg-white rounded-3xl border border-[#F1ECE6] p-5 soft-card space-y-4 fade-in";
                let ingH = ""; if (m.recipe?.ingredients) m.recipe.ingredients.forEach(ing => { ingH += `<li class="text-[11px] text-[#6D6A75] flex items-center"><span class="w-1.5 h-1.5 bg-[#E07A5F]/40 rounded-full mr-2"></span>${ing}</li>`; });
                let stH = ""; if (m.recipe?.steps) m.recipe.steps.forEach((step, sIdx) => { stH += `<div class="flex items-start space-x-2"><span class="text-[10px] bg-[#FAF8F5] text-[#E07A5F] w-4 h-4 rounded-full flex items-center justify-center font-bold shrink-0 mt-0.5">${sIdx + 1}</span><p class="text-[11px] text-[#6D6A75] leading-relaxed">${step}</p></div>`; });

                card.innerHTML = `
                    <div class="flex items-center justify-between border-b pb-2"><span class="text-xs font-bold text-white bg-[#E07A5F] px-4 py-1.5 rounded-full font-handwriting">${m.day}</span></div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 bg-[#FAF8F5]/60 p-3.5 rounded-2xl border">
                        <div><span class="text-[9px] text-[#E07A5F] font-bold block">MAIN DISH</span><p class="text-xs font-bold">${m.main_dish}</p><p class="text-[10px] text-[#81B29A] font-medium pt-1"><i class="fa-regular fa-lightbulb"></i> ${m.main_key_point || ''}</p></div>
                        <div class="border-t md:border-t-0 md:border-l pt-2 md:pt-0 md:pl-3"><span class="text-[9px] text-[#A9A5A0] font-bold block">SUB DISH</span><p class="text-xs">${m.sub_dish}</p></div>
                        <div class="border-t md:border-t-0 md:border-l pt-2 md:pt-0 md:pl-3"><span class="text-[9px] text-[#A9A5A0] font-bold block">SOUP</span><p class="text-xs">${m.soup}</p></div>
                    </div>
                    <div id="${recipeId}" class="accordion-content space-y-3 pt-1 border-t hidden"><div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2"><div><span class="text-[10px] font-bold text-[#A9A5A0] block">材料・分量</span><ul class="space-y-1 bg-[#FAF8F5]/30 p-3 rounded-2xl">${ingH}</ul></div><div><span class="text-[10px] font-bold text-[#A9A5A0] block">手順</span><div class="space-y-2 bg-[#FAF8F5]/30 p-3 rounded-2xl">${stH}</div></div></div></div>
                    <div id="${changeFormId}" class="hidden bg-[#FAF8F5] p-3 rounded-2xl border space-y-2">
                        <div class="flex gap-2"><input type="text" id="change-input-${idx}" class="flex-1 text-xs bg-white border rounded-xl px-3 py-2 outline-none" placeholder="例：別の魚メニューに変えて"><button class="gen-btn bg-[#E07A5F] text-white text-xs font-bold px-4 py-2 rounded-xl" onclick="window.reBuildSingleDay('${m.day}', ${idx})">再生成</button></div>
                    </div>
                    <div class="flex items-center justify-between pt-1 border-t">
                        <button class="text-[11px] text-[#E07A5F] font-bold hover:underline" onclick="toggleAccordion('${recipeId}', this)"><i class="fa-solid fa-chevron-down"></i> <span>レシピ・材料を見る</span></button>
                        <button class="text-[11px] text-[#A9A5A0] font-bold" onclick="document.getElementById('${changeFormId}').classList.toggle('hidden')"><i class="fa-solid fa-rotate"></i> <span>この日を作り直す</span></button>
                    </div>`;
                tabContentMenus.appendChild(card);
            });
        }

        window.toggleAccordion = function(id, btn) {
            const content = document.getElementById(id); const icon = btn.querySelector("i"); const label = btn.querySelector("span");
            if (content.classList.contains("hidden")) { content.classList.remove("hidden"); icon.classList.add("rotate-180"); label.innerText = "レシピを閉じる"; }
            else { content.classList.add("hidden"); icon.classList.remove("rotate-180"); label.innerText = "レシピ・材料を見る"; }
        };

        function renderMergedShoppingList() {
            shoppingGrid.innerHTML = "";
            const sections = { "① お野菜・フルーツ": [], "② お肉・お魚": [], "③ 豆腐・牛乳・調味料": [] };

            weeklyMenu.forEach(dayMenu => {
                if (!dayMenu || dayMenu.is_empty || !dayMenu.day_shopping) return;
                dayMenu.day_shopping.forEach(block => {
                    let sec = block.section || "";
                    let targetSec = "③ 豆腐・牛乳・調味料";
                    if (/野菜|果物|青果|フルーツ|芋|大根|トマト|キャベツ|ネギ/.test(sec)) targetSec = "① お野菜・フルーツ";
                    else if (/肉|魚|鮮魚|精肉|海鮮|エビ|鶏|豚|牛/.test(sec)) targetSec = "② お肉・お魚";
                    
                    if (block.items) {
                        block.items.forEach(item => { if (!sections[targetSec].includes(item)) sections[targetSec].push(item); });
                    }
                });
            });

            const checkedItems = JSON.parse(localStorage.getItem("gemini_checked_items") || "{}");
            Object.keys(sections).forEach(secName => {
                const items = sections[secName]; const block = document.createElement("div");
                block.className = "space-y-2.5 bg-[#FAF8F5]/50 p-4 rounded-2xl border";
                let itemsHTML = "";
                items.forEach(item => {
                    const isChecked = checkedItems[item] ? "checked" : ""; const strikeClass = isChecked ? "checked-item" : "";
                    itemsHTML += `<label class="flex items-start space-x-2.5 py-1 cursor-pointer"><input type="checkbox" ${isChecked} class="mt-0.5 rounded text-[#E07A5F]" data-item-text="${item}" onchange="toggleCheckboxStrike(this)"><span class="text-xs font-medium text-[#6D6A75] ${strikeClass}">${item}</span></label>`;
                });
                block.innerHTML = `<span class="text-[11px] font-bold text-white bg-[#81B29A] px-3 py-1 rounded-full font-handwriting tracking-wide inline-block mb-1">${secName}</span><div class="space-y-1">${itemsHTML || '<p class="text-[10px] text-gray-400 py-2">アイテムはありません。</p>'}</div>`;
                shoppingGrid.appendChild(block);
            });
        }

        window.toggleCheckboxStrike = function(cb) {
            const labelSpan = cb.nextElementSibling; const itemText = cb.getAttribute("data-item-text");
            const savedStrikes = JSON.parse(localStorage.getItem("gemini_checked_items") || "{}");
            if (cb.checked) { if (labelSpan) labelSpan.classList.add("checked-item"); savedStrikes[itemText] = true; }
            else { if (labelSpan) labelSpan.classList.remove("checked-item"); delete savedStrikes[itemText]; }
            localStorage.setItem("gemini_checked_items", JSON.stringify(savedStrikes));
        };

        function cleanJsonString(str) {
            let cleaned = str.trim();
            if (cleaned.startsWith("```")) cleaned = cleaned.replace(/^```[a-zA-Z]*/, "").replace(/```$/, "");
            return cleaned.trim();
        }
    </script>
</body>
</html>
